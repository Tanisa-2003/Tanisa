<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tanisa | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
}

.hero{
    width:100%;
    height:100vh;

    background:
    linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
    url("img/bg.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    flex-direction:column;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:25px 8%;
}

.logo{
    color:white;
    font-size:2rem;
    font-weight:700;
}

.logo span{
    color:#ff4d4d;
}

nav ul{
    display:flex;
    gap:35px;
    list-style:none;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:14px;
    font-weight:500;
    transition:.3s;
}

nav ul li a:hover{
    color:#ff4d4d;
}

.content{
    flex:1;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;
}

.content h1{
    font-size:clamp(2.5rem, 8vw, 4rem);
    margin-bottom:10px;
}

.content h3{
    letter-spacing:2px;
    font-size:clamp(0.9rem, 3vw, 1.3rem);
    margin-bottom:10px;
}

.content p{
    font-size:1rem;
    max-width:650px;
    line-height:1.8;
    margin-bottom:30px;
    color:#f1f1f1;
}

.btn{
    padding:15px 40px;

    background:#ff4d4d;
    color:white;

    border-radius:50px;
    text-decoration:none;

    font-weight:600;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    background:#ff3333;
}

.scroll{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:2rem;
    animation:move 1.5s infinite;
}

@keyframes move{
    0%{transform:translate(-50%,0);}
    50%{transform:translate(-50%,10px);}
    100%{transform:translate(-50%,0);}
}

/* Mobile Responsive */
@media (max-width: 768px){

    body{
        overflow-y:auto;
    }

    nav{
        flex-direction:column;
        gap:15px;
        padding:20px;
    }

    nav ul{
        flex-wrap:wrap;
        justify-content:center;
        gap:15px;
    }

    nav ul li a{
        font-size:12px;
    }

    .content{
        padding:20px;
    }

    .content h1{
        font-size:2.5rem;
    }

    .content h3{
        font-size:1rem;
        letter-spacing:1px;
    }

    .content p{
        font-size:0.9rem;
        max-width:100%;
        padding:0 10px;
    }

    .btn{
        padding:12px 30px;
        font-size:14px;
    }

    .scroll{
        font-size:1.5rem;
        bottom:15px;
    }
}

</style>

</head>

<body>

<section class="hero">

    <nav>
        <div class="logo">
            <span>T</span>anisa
        </div>

        <ul>
            <li><a href="portfolio.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="education.html">EDUCATION</a></li>
            <li><a href="project.html">PROJECTS</a></li>
            <li><a href="certificate.html">CERTIFICATES</a></li>
            <li><a href="contact.html">CONTACT</a></li>
        </ul>
    </nav>

    <div class="content">

        <h3>Welcome to My Portfolio</h3>

        <h1>Tanisa Parui</h1>

        <h3>Full-Stack Developer & AI Enthusiast</h3>

        <p style="max-width:650px;margin-bottom:30px;">
            Explore my journey, projects, skills, certifications, and achievements
            in the world of technology.
        </p> 

        <a href="portfolio.html" class="btn">
            Explore Portfolio
        </a>

    </div>

    <div class="scroll">
        ⌄
    </div>

</section>

</body>
</html>
